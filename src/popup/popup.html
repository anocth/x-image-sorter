<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>X Image Sorter</title>
<style>
	body { font-family: sans-serif; padding: 12px; min-width: 200px; }
	button { display: block; width: 100%; margin-bottom: 8px; padding: 8px; cursor: pointer; }
	input[type="file"] { display: none; }
	#status { font-size: 12px; color: #666; margin-top: 4px; }
</style>
</head>
<body>
<button id="export">エクスポート</button>
<button id="import-btn">インポート</button>
<input type="file" id="import-file" accept=".json">
<button id="rebuild">profile.json 再生成</button>
<div id="status"></div>
<script src="popup.js"></script>
</body>
</html>
